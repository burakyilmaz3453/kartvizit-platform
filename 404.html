<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="icon" type="image/x-icon" href="favicon-platform.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa Bulunamadı | Noshutdown</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #C9A84C;
      --gold-light: #E2C47A;
      --bg: #080808;
      --text: #F2EDE4;
      --text-muted: #8A8680;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
      letter-spacing: -0.02em;
      opacity: 0.8;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin: 1rem 0 0.75rem;
      letter-spacing: 0.05em;
    }
    p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      border: 1px solid var(--gold);
      color: var(--gold);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }
    .btn:hover { background: var(--gold); color: var(--bg); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Sayfa Bulunamadı</h1>
    <p>Aradığın sayfa mevcut değil veya taşınmış olabilir.</p>
    <a href="index.html" class="btn">Ana Sayfaya Dön</a>
  </div>
</body>
</html>
