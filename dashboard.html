<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel | Kartvizit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 20px; }
    .topbar { max-width: 600px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #0e8c6f; }
    .logout-btn { background: #23262b; border: 1px solid #2a2d35; color: #8b9bb4; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; transition: 0.2s; }
    .logout-btn:hover { color: #fff; background: #2c3036; }
    .container { max-width: 600px; margin: 0 auto; }
    .section { background: #181a1e; border: 1px solid #2a2d35; border-radius: 16px; padding: 24px; margin-bottom: 16px; }
    .section h3 { font-size: 0.85rem; color: #8b9bb4; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid #2a2d35; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.78rem; color: #8b9bb4; margin-bottom: 6px; }
    input[type="text"], input[type="email"], input[type="password"] { width: 100%; background: #1e2125; border: 1px solid #2a2d35; border-radius: 10px; padding: 11px 14px; color: #fff; font-size: 0.88rem; outline: none; transition: 0.2s; font-family: inherit; }
    input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus { border-color: #0e8c6f; }
    input::placeholder { color: #555; }
    .save-btn { width: 100%; padding: 13px; background: #0e8c6f; color: #fff; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 8px; }
    .save-btn:hover { background: #0b7058; }
    .save-btn:disabled { background: #333; cursor: not-allowed; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #0e8c6f; color: #fff; padding: 10px 22px; border-radius: 25px; font-size: 0.85rem; font-weight: 600; opacity: 0; transition: 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .card-link-box { background: #1e2125; border: 1px solid #2a2d35; border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .card-link-box a { color: #0e8c6f; font-size: 0.85rem; text-decoration: none; word-break: break-all; }
    .copy-link { background: #2a2d35; border: none; color: #8b9bb4; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; white-space: nowrap; transition: 0.2s; }
    .copy-link:hover { background: #444; color: #fff; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } }
    .photo-upload-area { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
    .photo-preview { width: 80px; height: 80px; border-radius: 50%; background: #1e2125; border: 2px solid #2a2d35; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #0e8c6f; flex-shrink: 0; overflow: hidden; }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
    .banner-preview { width: 100%; height: 80px; border-radius: 10px; background: #1e2125; border: 2px solid #2a2d35; margin-bottom: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; color: #555; font-size: 0.82rem; }
    .banner-preview img { width: 100%; height: 100%; object-fit: cover; }
    .upload-btn { background: #23262b; border: 1px solid #2a2d35; color: #8b9bb4; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; transition: 0.2s; }
    .upload-btn:hover { color: #fff; background: #2c3036; }
    input[type="file"] { display: none; }
    .uploading { color: #0e8c6f; font-size: 0.8rem; margin-top: 4px; }

    /* Renk seçici */
    .color-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    .color-option { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; position: relative; }
    .color-option:hover { transform: scale(1.1); }
    .color-option.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.3); }
    .color-option.active::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-size: 0.8rem; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
    .custom-color-row { display: flex; align-items: center; gap: 10px; }
    .custom-color-row label { margin: 0; white-space: nowrap; }
    input[type="color"] { width: 44px; height: 36px; border: 1px solid #2a2d35; border-radius: 8px; background: #1e2125; cursor: pointer; padding: 2px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">🪪 Kartvizit</div>
    <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
  </div>
  <div class="container">

    <div class="section">
      <h3>Kartvizit Linkin</h3>
      <div class="card-link-box">
        <a id="card-link" href="#" target="_blank">Yükleniyor...</a>
        <button class="copy-link" onclick="copyLink()">Kopyala</button>
      </div>
    </div>

    <div class="section">
      <h3>Fotoğraflar</h3>
      <label>Profil Fotoğrafı</label>
      <div class="photo-upload-area">
        <div class="photo-preview" id="avatar-preview">👤</div>
        <div>
          <button class="upload-btn" onclick="document.getElementById('avatar-input').click()">Fotoğraf Seç</button>
          <input type="file" id="avatar-input" accept="image/*" onchange="uploadAvatar(this)">
          <p class="uploading" id="avatar-status"></p>
        </div>
      </div>
      <label>Banner Görseli</label>
      <div class="banner-preview" id="banner-preview">Banner görseli yok</div>
      <button class="upload-btn" onclick="document.getElementById('banner-input').click()">Banner Seç</button>
      <input type="file" id="banner-input" accept="image/*" onchange="uploadBanner(this)">
      <p class="uploading" id="banner-status"></p>
    </div>

    <!-- Tema & Renk -->
    <div class="section">
      <h3>Görünüm</h3>

      <label style="margin-bottom:10px;display:block;">Tema</label>
      <div style="display:flex;gap:10px;margin-bottom:20px;">
        <div id="theme-dark" onclick="selectTheme('dark')" style="flex:1;padding:12px;background:#000;border:2px solid #0e8c6f;border-radius:10px;cursor:pointer;text-align:center;transition:0.2s;">
          <div style="font-size:1.2rem;">🌙</div>
          <div style="font-size:0.78rem;color:#fff;margin-top:4px;">Koyu</div>
        </div>
        <div id="theme-light" onclick="selectTheme('light')" style="flex:1;padding:12px;background:#f0f2f5;border:2px solid transparent;border-radius:10px;cursor:pointer;text-align:center;transition:0.2s;">
          <div style="font-size:1.2rem;">☀️</div>
          <div style="font-size:0.78rem;color:#333;margin-top:4px;">Aydınlık</div>
        </div>
      </div>

      <label style="margin-bottom:10px;display:block;">Accent Rengi</label>
      <div class="color-grid" id="color-grid">
        <div class="color-option" style="background:#0e8c6f" data-color="#0e8c6f" onclick="selectColor('#0e8c6f')"></div>
        <div class="color-option" style="background:#2563eb" data-color="#2563eb" onclick="selectColor('#2563eb')"></div>
        <div class="color-option" style="background:#7c3aed" data-color="#7c3aed" onclick="selectColor('#7c3aed')"></div>
        <div class="color-option" style="background:#db2777" data-color="#db2777" onclick="selectColor('#db2777')"></div>
        <div class="color-option" style="background:#dc2626" data-color="#dc2626" onclick="selectColor('#dc2626')"></div>
        <div class="color-option" style="background:#ea580c" data-color="#ea580c" onclick="selectColor('#ea580c')"></div>
        <div class="color-option" style="background:#ca8a04" data-color="#ca8a04" onclick="selectColor('#ca8a04')"></div>
        <div class="color-option" style="background:#0891b2" data-color="#0891b2" onclick="selectColor('#0891b2')"></div>
      </div>
      <div class="custom-color-row">
        <label>Özel renk:</label>
        <input type="color" id="custom-color" value="#0e8c6f" onchange="selectColor(this.value)">
        <span id="color-hex" style="color:#8b9bb4;font-size:0.82rem;">#0e8c6f</span>
      </div>
    </div>

    <div class="section">
      <h3>Kişisel Bilgiler</h3>
      <div class="form-group"><label>Ad Soyad</label><input type="text" id="full_name" placeholder="Burak Yılmaz"></div>
      <div class="two-col">
        <div class="form-group"><label>Şirket</label><input type="text" id="company" placeholder="Şirket Adı"></div>
        <div class="form-group"><label>Unvan</label><input type="text" id="title" placeholder="Sistem Yöneticisi"></div>
      </div>
    </div>

    <div class="section">
      <h3>İletişim</h3>
      <div class="two-col">
        <div class="form-group"><label>Cep Telefonu</label><input type="text" id="mobile" placeholder="+90 555 000 00 00"></div>
        <div class="form-group"><label>İş Telefonu</label><input type="text" id="work_phone" placeholder="+90 212 000 00 00"></div>
      </div>
      <div class="form-group"><label>E-posta</label><input type="email" id="email" placeholder="email@sirket.com"></div>
      <div class="form-group"><label>Web Sitesi</label><input type="text" id="website" placeholder="www.sirket.com"></div>
    </div>

    <div class="section">
      <h3>Adres</h3>
      <div class="form-group"><label>Adres</label><input type="text" id="address" placeholder="Maslak Mah. Büyükdere Cad. İstanbul"></div>
    </div>

    <div class="section">
      <h3>Sosyal Medya</h3>
      <div class="form-group"><label>LinkedIn</label><input type="text" id="linkedin" placeholder="https://linkedin.com/in/kullanici"></div>
      <div class="form-group"><label>Instagram</label><input type="text" id="instagram" placeholder="https://instagram.com/kullanici"></div>
      <div class="form-group"><label>Twitter / X</label><input type="text" id="twitter" placeholder="https://twitter.com/kullanici"></div>
      <div class="form-group"><label>Facebook</label><input type="text" id="facebook" placeholder="https://facebook.com/kullanici"></div>
    </div>

    <div class="section">
      <h3>Şirket Bilgileri</h3>
      <div class="two-col">
        <div class="form-group"><label>Vergi Dairesi</label><input type="text" id="tax_office" placeholder="Boğaziçi Kurumlar"></div>
        <div class="form-group"><label>Vergi No</label><input type="text" id="tax_no" placeholder="1234567890"></div>
      </div>
    </div>

    <button class="save-btn" id="save-btn" onclick="saveProfile()">💾 Değişiklikleri Kaydet</button>

    <div class="section" style="margin-top:16px;">
      <h3>Şifre Değiştir</h3>
      <div class="form-group"><label>Yeni Şifre</label><input type="password" id="new-password" placeholder="En az 6 karakter"></div>
      <div class="form-group"><label>Şifre Tekrar</label><input type="password" id="confirm-password" placeholder="Şifreyi tekrar gir"></div>
      <button class="save-btn" onclick="changePassword()">🔒 Şifreyi Güncelle</button>
    </div>

  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    let currentUser = null;
    let currentUsername = null;
    let selectedColor = '#0e8c6f';
    let selectedTheme = 'dark';

    sb.auth.getSession().then(async ({ data }) => {
      if (!data.session) { window.location.href = 'login.html'; return; }
      currentUser = data.session.user;
      loadProfile();
    });

    async function loadProfile() {
      const { data } = await sb.from('profiles').select('*').eq('user_id', currentUser.id).single();
      if (!data) return;
      currentUsername = data.username;

      const link = `${window.location.origin}/kartvizit-platform/card.html?username=${data.username}`;
      document.getElementById('card-link').href = link;
      document.getElementById('card-link').textContent = link;

      if (data.avatar_url) document.getElementById('avatar-preview').innerHTML = `<img src="${data.avatar_url}" alt="Profil">`;
      if (data.banner_url) document.getElementById('banner-preview').innerHTML = `<img src="${data.banner_url}" alt="Banner">`;

      if (data.theme_color) { selectColor(data.theme_color); document.getElementById('custom-color').value = data.theme_color; }
      if (data.theme) selectTheme(data.theme);

      const fields = ['full_name','company','title','mobile','work_phone','email','website','address','linkedin','instagram','twitter','facebook','tax_office','tax_no'];
      fields.forEach(f => { if (data[f]) document.getElementById(f).value = data[f]; });
    }

    function selectTheme(theme) {
      selectedTheme = theme;
      document.getElementById('theme-dark').style.borderColor = theme === 'dark' ? '#0e8c6f' : 'transparent';
      document.getElementById('theme-light').style.borderColor = theme === 'light' ? '#0e8c6f' : 'transparent';
    }

    function selectColor(color) {
      selectedColor = color;
      document.getElementById('color-hex').textContent = color;
      document.getElementById('custom-color').value = color;
      document.querySelectorAll('.color-option').forEach(el => {
        el.classList.toggle('active', el.dataset.color === color);
      });
    }

    async function uploadAvatar(input) {
      const file = input.files[0];
      if (!file) return;
      document.getElementById('avatar-status').textContent = 'Yükleniyor...';
      const ext = file.name.split('.').pop();
      const path = `${currentUser.id}/avatar_${Date.now()}.${ext}`;
      const { error } = await sb.storage.from('Avatars').upload(path, file, { upsert: true });
      if (error) { document.getElementById('avatar-status').textContent = 'Hata!'; return; }
      const { data } = sb.storage.from('Avatars').getPublicUrl(path);
      const url = data.publicUrl + '?t=' + Date.now();
      await sb.from('profiles').update({ avatar_url: url }).eq('user_id', currentUser.id);
      document.getElementById('avatar-preview').innerHTML = `<img src="${url}" alt="Profil">`;
      document.getElementById('avatar-status').textContent = '✓ Yüklendi!';
      setTimeout(() => document.getElementById('avatar-status').textContent = '', 2000);
    }

    async function uploadBanner(input) {
      const file = input.files[0];
      if (!file) return;
      document.getElementById('banner-status').textContent = 'Yükleniyor...';
      const ext = file.name.split('.').pop();
      const path = `${currentUser.id}/banner_${Date.now()}.${ext}`;
      const { error } = await sb.storage.from('Avatars').upload(path, file, { upsert: true });
      if (error) { document.getElementById('banner-status').textContent = 'Hata!'; return; }
      const { data } = sb.storage.from('Avatars').getPublicUrl(path);
      const url = data.publicUrl + '?t=' + Date.now();
      await sb.from('profiles').update({ banner_url: url }).eq('user_id', currentUser.id);
      document.getElementById('banner-preview').innerHTML = `<img src="${url}" alt="Banner">`;
      document.getElementById('banner-status').textContent = '✓ Yüklendi!';
      setTimeout(() => document.getElementById('banner-status').textContent = '', 2000);
    }

    async function saveProfile() {
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Kaydediliyor...';
      const fields = ['full_name','company','title','mobile','work_phone','email','website','address','linkedin','instagram','twitter','facebook','tax_office','tax_no'];
      const updates = {};
      fields.forEach(f => { updates[f] = document.getElementById(f).value.trim(); });
      updates.theme_color = selectedColor;
      updates.theme = selectedTheme;

      const { error } = await sb.from('profiles').upsert({
        user_id: currentUser.id,
        username: currentUsername || currentUser.email.split('@')[0],
        ...updates
      }, { onConflict: 'user_id' });
      btn.disabled = false;
      btn.textContent = '💾 Değişiklikleri Kaydet';
      if (error) { showToast('Hata: ' + error.message, true); }
      else { showToast('✓ Kaydedildi!'); loadProfile(); }
    }

    async function changePassword() {
      const newPass = document.getElementById('new-password').value;
      const confirmPass = document.getElementById('confirm-password').value;
      if (!newPass || !confirmPass) { showToast('Tüm alanları doldurun.', true); return; }
      if (newPass.length < 6) { showToast('Şifre en az 6 karakter olmalı.', true); return; }
      if (newPass !== confirmPass) { showToast('Şifreler eşleşmiyor.', true); return; }
      const { error } = await sb.auth.updateUser({ password: newPass });
      if (error) {
        var msg = error.message;
        if (msg.includes('different from the old password')) msg = 'Yeni şifre eski şifreden farklı olmalı.';
        showToast(msg, true);
      } else {
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
        showToast('✓ Şifre güncellendi!');
      }
    }

    async function logout() { await sb.auth.signOut(); window.location.href = 'index.html'; }

    function copyLink() {
      navigator.clipboard.writeText(document.getElementById('card-link').textContent).then(() => showToast('✓ Kopyalandı!'));
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#c0392b' : '#0e8c6f';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
