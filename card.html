<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dijital Kartvizit</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <style>
    :root {
      --bg-dark: #000000;
      --card-bg: #181a1e;
      --text-white: #ffffff;
      --text-grey: #8b9bb4;
      --accent-color: #0e8c6f;
      --border-color: #2a2d35;
      --site-width: 450px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-white); overflow-x: hidden; }

    /* HEADER */
    .fixed-header {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: var(--site-width); height: 425px;
      z-index: 1; background-color: #000;
      display: flex; flex-direction: column; align-items: center;
    }
    .banner-container {
      width: 100%; height: 160px; flex-shrink: 0;
      overflow: hidden; border-radius: 0 0 20px 20px; z-index: 1;
      background: #1a1a2e;
    }
    .banner-img { width: 100%; height: 100%; object-fit: cover; }
    .fixed-card-part {
      width: 100%; background-color: #181a1e;
      margin-top: -40px; padding-top: 105px; padding-bottom: 25px;
      border-radius: 25px; border: 1px solid #2a2d35;
      display: flex; flex-direction: column; align-items: center;
      flex-grow: 1; z-index: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .profile-container {
      width: 110px; height: 110px;
      border-radius: 50%; border: 4px solid #181a1e;
      overflow: hidden; background: #222; z-index: 2;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      position: absolute; top: 160px;
      display: flex; align-items: center; justify-content: center;
    }
    .profile-img { width: 100%; height: 100%; object-fit: cover; }
    .profile-initials { font-size: 2.5rem; font-weight: 700; color: #0e8c6f; }
    .header-info { margin-bottom: 5px; text-align: center; z-index: 5; position: relative; }
    .name { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; color: #fff; }
    .company { color: var(--text-grey); font-size: 0.8rem; letter-spacing: 0.5px; }
    .title { font-size: 0.85rem; font-weight: 500; margin-top: 2px; color: var(--accent-color); }
    .action-buttons {
      display: flex; justify-content: space-between; gap: 8px;
      width: 90%; margin-top: 25px;
    }
    .action-btn {
      background: #23262b; border: 1px solid var(--border-color);
      border-radius: 10px; padding: 10px 2px; flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-decoration: none; cursor: pointer; transition: 0.2s; min-width: 0;
    }
    .action-btn:hover { background: #2c3036; }
    .action-btn span { font-size: 0.65rem; margin-top: 6px; color: var(--text-grey); font-weight: 500; white-space: nowrap; }
    .highlight-btn { background: var(--accent-color); border-color: var(--accent-color); }
    .highlight-btn:hover { background: #0b7058; }
    .highlight-btn span { color: #fff; }
    .btn-icon { width: 20px; height: 20px; }

    /* SCROLL CONTENT */
    .scroll-content {
      margin-top: 445px; width: 100%; max-width: var(--site-width);
      margin-left: auto; margin-right: auto;
      position: relative; z-index: 100; padding-bottom: 40px;
    }
    .card-body {
      background-color: #181a1e; border-radius: 25px; padding: 20px;
      min-height: 60vh; border: 1px solid #2a2d35;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
    }
    .card-body::before {
      content: ''; display: block; width: 40px; height: 4px;
      background-color: #333; margin: 0 auto 15px auto; border-radius: 2px;
    }
    .info-list, .company-section { display: flex; flex-direction: column; gap: 12px; }
    .info-item, .company-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #1e2125; padding: 12px 15px;
      border-radius: 10px; border: 1px solid var(--border-color); gap: 10px;
    }
    .list-icon { width: 20px; height: 20px; fill: var(--text-grey); flex-shrink: 0; }
    .list-text { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .label { font-size: 0.7rem; color: var(--text-grey); margin-bottom: 2px; }
    .value { font-size: 0.9rem; color: #fff; word-wrap: break-word; }
    .value-link { text-decoration: none; color: #fff; }
    .value-link:hover { color: var(--accent-color); }
    .copy-btn-box {
      background: #2a2d35; border: 1px solid #333; color: var(--text-grey);
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.2s; flex-shrink: 0;
    }
    .copy-btn-box:hover { background: #444; color: #fff; }
    .icon-sm { width: 16px; height: 16px; fill: currentColor; }
    .map-section {
      margin-top: 20px; padding: 15px; background: #1e2125;
      border-radius: 12px; border: 1px solid var(--border-color);
    }
    .map-section h3, .social-section h3, .company-section h3 {
      font-size: 0.9rem; margin-bottom: 12px; color: #fff;
      border-bottom: 1px solid #333; padding-bottom: 8px;
    }
    .directions-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--accent-color); color: white; padding: 10px;
      border-radius: 8px; text-decoration: none; font-weight: 600;
      font-size: 0.85rem; width: 100%;
    }
    .social-section { margin-top: 20px; padding: 0 5px; }
    .social-btn {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 8px;
      text-decoration: none; transition: 0.2s;
    }
    .social-btn.linkedin { background-color: transparent; }
    .social-btn.linkedin:hover { opacity: 0.8; }
    .linkedin-icon { width: 30px; height: 30px; }
    .company-section { margin-top: 20px; }
    .modal {
      display: none; position: fixed; z-index: 100; left: 0; top: 0;
      width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);
      align-items: center; justify-content: center; backdrop-filter: blur(5px);
    }
    .modal-content {
      background-color: #1e2126; padding: 30px; border-radius: 20px;
      text-align: center; width: 90%; max-width: 320px;
      position: relative; border: 1px solid var(--border-color);
    }
    .modal-qr { width: 100%; max-width: 220px; margin: 20px 0; background: #fff; padding: 10px; border-radius: 10px; }
    footer { text-align: center; padding: 30px 0 10px; color: #444; font-size: 11px; }
    .not-found {
      text-align: center; padding: 60px 20px; color: var(--text-grey);
    }
    .not-found h2 { color: #fff; margin-bottom: 10px; }
    #toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #0e8c6f; color: #fff; padding: 10px 22px;
      border-radius: 25px; font-size: 0.85rem; font-weight: 600;
      opacity: 0; transition: 0.3s; z-index: 9999; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- YÜKLENİYOR -->

  <!-- BULUNAMADI -->

          <div class="company-item" id="row-tax-no">
            <svg class="list-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2.01.89-2.01 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm-1 14H5v-2h14v2zm0-6H5V8h14v4z"/></svg>
            <div class="list-text"><span class="label">Vergi No</span><span class="value" id="p-tax-no"></span></div>
            <button class="copy-btn-box" onclick="copyText('p-tax-no')"><svg class="icon-sm" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button>
          </div>
        </div>

        <footer>&copy; <span id="footer-year"></span> <span id="footer-name"></span></footer>
      </div>
    </div>

    <!-- QR Modal -->
    <div id="qrModal" class="modal" onclick="this.style.display='none'">
      <div class="modal-content" onclick="event.stopPropagation()">
        <h3>QR Kod</h3>
        <img id="qr-img" src="" alt="QR Kod" class="modal-qr">
        <p style="font-size:0.8rem;color:#8b9bb4;">Bu sayfanın QR kodu</p>
      </div>
    </div>

  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="supabase.js"></script>
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    const params = new URLSearchParams(window.location.search);
    const username = params.get('username');

    if (!username) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('not-found').classList.remove('hidden');
    } else {
      loadCard(username);
    }

    async function loadCard(username) {
      const { data, error } = await sb
        .from('profiles')
        .select('*')
        .eq('username', username)
        .single();

      document.getElementById('loading').classList.add('hidden');

      if (!data) {
        document.getElementById('not-found').classList.remove('hidden');
        return;
      }

      document.getElementById('card-content').classList.remove('hidden');

      // Başlık
      const name = data.full_name || data.username;
      document.getElementById('p-name').textContent = name;
      document.getElementById('footer-name').textContent = name;
      document.title = name + ' | Dijital Kartvizit';

      if (data.company) document.getElementById('p-company').textContent = data.company;
      if (data.title) document.getElementById('p-title').textContent = data.title;

      // İnisiyaller
      const initials = name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
      document.getElementById('initials').textContent = initials;

      // Butonlar
      if (data.mobile) {
        document.getElementById('btn-call').href = 'tel:' + data.mobile;
        document.getElementById('btn-whatsapp').href = 'https://wa.me/' + data.mobile.replace(/[^0-9]/g, '');
        document.getElementById('p-mobile').textContent = data.mobile;
      } else { document.getElementById('row-mobile').classList.add('hidden'); }

      if (data.work_phone) document.getElementById('p-work').textContent = data.work_phone;
      else document.getElementById('row-work').classList.add('hidden');

      if (data.email) {
        document.getElementById('btn-email').href = 'mailto:' + data.email;
        document.getElementById('p-email').textContent = data.email;
      } else { document.getElementById('row-email').classList.add('hidden'); }

      if (data.website) {
        const cleanWeb = data.website.replace(/^https?:\/\//, '');
        const webEl = document.getElementById('p-web');
        webEl.textContent = cleanWeb;
        webEl.href = data.website.startsWith('http') ? data.website : 'https://' + data.website;
      } else { document.getElementById('row-web').classList.add('hidden'); }

      if (data.address) {
        document.getElementById('p-address').textContent = data.address;
        document.getElementById('btn-direction').href = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(data.address);
      } else { document.getElementById('row-address').classList.add('hidden'); }

      if (data.linkedin) {
        document.getElementById('btn-linkedin').href = data.linkedin.startsWith('http') ? data.linkedin : 'https://' + data.linkedin;
      } else { document.getElementById('row-linkedin').classList.add('hidden'); }

      if (data.company) document.getElementById('p-comp-name').textContent = data.company;
      else document.getElementById('row-comp-name').classList.add('hidden');

      if (data.tax_office) document.getElementById('p-tax-office').textContent = data.tax_office;
      else document.getElementById('row-tax-office').classList.add('hidden');

      if (data.tax_no) document.getElementById('p-tax-no').textContent = data.tax_no;
      else document.getElementById('row-tax-no').classList.add('hidden');

      if (!data.company && !data.tax_office && !data.tax_no) {
        document.getElementById('row-company-info').classList.add('hidden');
      }

      // VCF oluştur
      generateVCF(data);

      // QR oluştur
      QRCode.toDataURL(window.location.href, { width: 220, margin: 1 }, (err, url) => {
        if (!err) document.getElementById('qr-img').src = url;
      });
    }

    function generateVCF(d) {
      const vcf = `BEGIN:VCARD
VERSION:3.0
FN:${d.full_name || d.username}
ORG:${d.company || ''}
TITLE:${d.title || ''}
TEL;TYPE=CELL:${d.mobile || ''}
TEL;TYPE=WORK:${d.work_phone || ''}
EMAIL:${d.email || ''}
URL:${d.website || ''}
ADR;TYPE=WORK:;;${d.address || ''};;;;
X-SOCIALPROFILE;type=linkedin:${d.linkedin || ''}
X-TAX-OFFICE:${d.tax_office || ''}
X-TAX-NUMBER:${d.tax_no || ''}
END:VCARD`;

      const blob = new Blob([vcf], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      document.getElementById('btn-vcf').href = url;
      document.getElementById('btn-vcf').download = (d.full_name || d.username) + '.vcf';
    }

    function copyText(id) {
      const el = document.getElementById(id);
      const text = el.textContent || el.innerText;
      if (!text) return;
      navigator.clipboard.writeText(text.trim()).then(() => showToast('✓ Kopyalandı!'));
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
