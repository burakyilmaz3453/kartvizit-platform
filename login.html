<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="icon" type="image/x-icon" href="favicon-platform.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap | Kartvizit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --gold:#C9A84C; --gold-light:#E2C47A; --gold-dim:#7A6235;
      --bg:#080808; --surface:#111111; --surface2:#161616;
      --border:rgba(201,168,76,0.14); --border-subtle:rgba(255,255,255,0.06);
      --text:#F0EBE1; --text-secondary:#7A7570; --text-muted:#4A4845;
    }
    body {
      background:var(--bg); color:var(--text);
      font-family:'DM Sans',sans-serif; font-weight:300;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:24px; overflow-x:hidden;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none; z-index:0; opacity:0.35;
    }
    .wrap {
      width:100%; max-width:380px; position:relative; z-index:1;
      animation:fadeUp 0.7s ease forwards;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .brand {
      text-align:center; margin-bottom:36px;
    }
    .brand-name {
      font-family:'Cormorant Garamond',serif;
      font-size:1.6rem; letter-spacing:0.18em;
      text-transform:uppercase; color:var(--gold);
    }
    .brand-tagline {
      font-size:0.65rem; letter-spacing:0.14em;
      text-transform:uppercase; color:var(--text-muted);
      margin-top:6px;
    }
    .card {
      background:var(--surface);
      border:1px solid var(--border-subtle);
      border-radius:12px;
      padding:36px 32px;
    }
    .back {
      display:inline-flex; align-items:center; gap:6px;
      color:var(--text-muted); text-decoration:none;
      font-size:0.7rem; letter-spacing:0.08em;
      text-transform:uppercase; margin-bottom:28px;
      transition:color 0.2s;
    }
    .back:hover { color:var(--text-secondary); }
    .back svg { width:14px; height:14px; fill:currentColor; }
    h2 {
      font-family:'Cormorant Garamond',serif;
      font-size:1.5rem; font-weight:300;
      color:var(--text); margin-bottom:4px;
    }
    .subtitle {
      font-size:0.78rem; color:var(--text-muted);
      margin-bottom:28px; line-height:1.5;
    }
    .form-group { margin-bottom:14px; }
    label {
      display:block; font-size:0.65rem;
      letter-spacing:0.1em; text-transform:uppercase;
      color:var(--text-muted); margin-bottom:6px;
    }
    input {
      width:100%; background:var(--surface2);
      border:1px solid var(--border-subtle); border-radius:6px;
      padding:11px 14px; color:var(--text);
      font-size:0.85rem; font-weight:300;
      font-family:'DM Sans',sans-serif; outline:none; transition:0.2s;
    }
    input:focus { border-color:var(--gold-dim); }
    input::placeholder { color:var(--text-muted); }
    .forgot {
      text-align:right; margin-top:-6px; margin-bottom:14px;
    }
    .forgot a {
      color:var(--text-muted); font-size:0.7rem;
      letter-spacing:0.04em; cursor:pointer; text-decoration:none;
      transition:color 0.2s;
    }
    .forgot a:hover { color:var(--gold); }
    .btn {
      width:100%; padding:13px;
      background:var(--gold); color:#080808;
      border:none; border-radius:6px;
      font-family:'DM Sans',sans-serif; font-size:0.78rem;
      font-weight:500; letter-spacing:0.12em; text-transform:uppercase;
      cursor:pointer; transition:0.2s; margin-top:6px;
    }
    .btn:hover { background:var(--gold-light); }
    .btn:disabled { background:var(--surface2); color:var(--text-muted); cursor:not-allowed; }
    .error {
      background:rgba(139,42,42,0.12); border:1px solid rgba(139,42,42,0.3);
      color:#FF8080; padding:10px 14px; border-radius:6px;
      font-size:0.78rem; margin-bottom:14px; display:none; line-height:1.4;
    }
    .success {
      background:rgba(201,168,76,0.06); border:1px solid var(--border);
      color:var(--gold); padding:10px 14px; border-radius:6px;
      font-size:0.78rem; margin-bottom:14px; display:none; line-height:1.4;
    }
    .bottom-link {
      text-align:center; margin-top:20px;
      font-size:0.75rem; color:var(--text-muted);
    }
    .bottom-link a { color:var(--gold); text-decoration:none; }
    .bottom-link a:hover { color:var(--gold-light); }
    .divider {
      height:1px; background:var(--border-subtle); margin:20px 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="brand-name">Kartvizit</div>
      <div class="brand-tagline">Dijital Kimliğinin Altın Standardı</div>
    </div>
    <div class="card">
      <a href="index.html" class="back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Geri
      </a>
      <h2>Giriş Yap</h2>
      <p class="subtitle">Hesabına giriş yap ve kartvizitini yönet.</p>
      <div class="error" id="error-msg"></div>
      <div class="success" id="success-msg"></div>
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="email" placeholder="email@sirket.com">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="password" placeholder="Şifreniz">
      </div>
      <div class="forgot">
        <a onclick="resetPassword()">Şifremi unuttum</a>
      </div>
      <button class="btn" id="login-btn" onclick="login()">Giriş Yap</button>
      <div class="divider"></div>
      <div class="bottom-link">
        Hesabın yok mu? <a href="register.html">Kayıt ol</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    // URL'den doğrulama token'ını yakala
    const hash = window.location.hash;
    if (hash && hash.includes('access_token') && hash.includes('type=signup')) {
      const params = new URLSearchParams(hash.substring(1));
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const type = params.get('type');
      if (accessToken && type === 'signup') {
        // access_token + refresh_token ile oturumu doğrudan başlat
        sb.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken || ''
        }).then(({ data, error }) => {
          if (!error && data.session) {
            document.getElementById('success-msg').textContent = '✓ E-posta adresiniz doğrulandı! Yönlendiriliyorsunuz...';
            document.getElementById('success-msg').style.display = 'block';
            history.replaceState(null, '', window.location.pathname);
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
          } else {
            document.getElementById('error-msg').textContent = 'Doğrulama bağlantısı geçersiz veya süresi dolmuş. Lütfen tekrar kayıt ol.';
            document.getElementById('error-msg').style.display = 'block';
            history.replaceState(null, '', window.location.pathname);
          }
        });
      }
    } else {
      sb.auth.getSession().then(({ data }) => {
        if (data.session) window.location.href = 'dashboard.html';
      });
    }
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');
      errorEl.style.display = 'none'; successEl.style.display = 'none';
      if (!email || !password) { errorEl.textContent = 'E-posta ve şifreyi girin.'; errorEl.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Giriş yapılıyor...';
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errorEl.textContent = 'E-posta veya şifre hatalı.';
        errorEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Giriş Yap'; return;
      }
      // E-posta doğrulama kontrolü
      if (!data.user.email_confirmed_at) {
        await sb.auth.signOut();
        errorEl.textContent = '⚠ Hesabın henüz doğrulanmamış. Kayıt olurken gönderilen doğrulama mailini kontrol et ve linke tıkla.';
        errorEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Giriş Yap'; return;
      }
      window.location.href = 'dashboard.html';
    }
    async function resetPassword() {
      const email = document.getElementById('email').value.trim();
      const errorEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');
      errorEl.style.display = 'none'; successEl.style.display = 'none';
      if (!email) { errorEl.textContent = 'Önce e-posta adresinizi girin.'; errorEl.style.display = 'block'; return; }
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://burakyilmaz3453.github.io/kartvizit-platform/reset.html'
      });
      if (!error) { successEl.textContent = '✓ Şifre sıfırlama maili gönderildi.'; successEl.style.display = 'block'; }
      else { errorEl.textContent = 'Hata: ' + error.message; errorEl.style.display = 'block'; }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
