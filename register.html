<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayıt Ol | Kartvizit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #181a1e;
      border: 1px solid #2a2d35;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .back {
      color: #8b9bb4;
      text-decoration: none;
      font-size: 0.85rem;
      display: inline-block;
      margin-bottom: 25px;
    }
    .back:hover { color: #fff; }
    h2 { font-size: 1.4rem; margin-bottom: 6px; }
    .subtitle { color: #8b9bb4; font-size: 0.85rem; margin-bottom: 30px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.78rem; color: #8b9bb4; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #1e2125;
      border: 1px solid #2a2d35;
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }
    input:focus { border-color: #0e8c6f; }
    input::placeholder { color: #555; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #0e8c6f;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }
    .btn:hover { background: #0b7058; }
    .btn:disabled { background: #333; cursor: not-allowed; }
    .error {
      background: #2d1515;
      border: 1px solid #5a1f1f;
      color: #ff6b6b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }
    .success {
      background: #0e2a22;
      border: 1px solid #0e8c6f;
      color: #0e8c6f;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }
    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.83rem;
      color: #8b9bb4;
    }
    .login-link a { color: #0e8c6f; text-decoration: none; }
    .hint {
      font-size: 0.75rem;
      color: #555;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <a href="index.html" class="back">← Geri</a>
    <h2>Kayıt Ol</h2>
    <p class="subtitle">Dijital kartvizitini oluşturmaya başla.</p>

    <div class="error" id="error-msg"></div>
    <div class="success" id="success-msg"></div>

    <div class="form-group">
      <label>Kullanıcı Adı</label>
      <input type="text" id="username" placeholder="ornek: burak" autocomplete="off">
      <p class="hint">Kartvizit linkin: kartvizit.com/card.html?username=...</p>
    </div>
    <div class="form-group">
      <label>E-posta</label>
      <input type="email" id="email" placeholder="email@ornek.com">
    </div>
    <div class="form-group">
      <label>Şifre</label>
      <input type="password" id="password" placeholder="En az 6 karakter">
    </div>

    <button class="btn" id="register-btn" onclick="register()">Kayıt Ol</button>

    <div class="login-link">
      Hesabın var mı? <a href="login.html">Giriş yap</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    async function register() {
      const username = document.getElementById('username').value.trim().toLowerCase();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('register-btn');
      const errorEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      // Validasyon
      if (!username || !email || !password) {
        errorEl.textContent = 'Tüm alanları doldurun.';
        errorEl.style.display = 'block';
        return;
      }
      if (username.length < 3) {
        errorEl.textContent = 'Kullanıcı adı en az 3 karakter olmalı.';
        errorEl.style.display = 'block';
        return;
      }
      if (!/^[a-z0-9_]+$/.test(username)) {
        errorEl.textContent = 'Kullanıcı adı sadece harf, rakam ve _ içerebilir.';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Kayıt yapılıyor...';

      // Kullanıcı adı dolu mu kontrol et
      const { data: existing } = await sb
        .from('profiles')
        .select('username')
        .eq('username', username)
        .single();

      if (existing) {
        errorEl.textContent = 'Bu kullanıcı adı zaten alınmış.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Kayıt Ol';
        return;
      }

      // Kayıt ol
      const { data, error } = await sb.auth.signUp({ email, password });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Kayıt Ol';
        return;
      }

      // Profil oluştur
      await sb.from('profiles').insert({
        user_id: data.user.id,
        username: username,
        email: email
      });

      successEl.textContent = 'Kayıt başarılı! E-postanı onaylayıp giriş yap.';
      successEl.style.display = 'block';
      btn.textContent = 'Kayıt Ol';
      btn.disabled = false;

      setTimeout(() => { window.location.href = 'login.html'; }, 2500);
    }

    // Enter tuşu desteği
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') register();
    });
  </script>
</body>
</html>
