<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="icon" type="image/x-icon" href="favicon-platform.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayıt Ol | Kartvizit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://www.google.com/recaptcha/api.js?render=6LfAY5QsAAAAAOZMdB7bem83mt7e0K4iq3AVFzGr"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --gold:#C9A84C; --gold-light:#E2C47A; --gold-dim:#7A6235;
      --bg:#080808; --surface:#111111; --surface2:#161616;
      --border:rgba(201,168,76,0.14); --border-subtle:rgba(255,255,255,0.06);
      --text:#F0EBE1; --text-secondary:#7A7570; --text-muted:#4A4845;
    }
    body {
      background:var(--bg); color:var(--text);
      font-family:'DM Sans',sans-serif; font-weight:300;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:24px; overflow-x:hidden;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none; z-index:0; opacity:0.35;
    }
    .wrap { width:100%; max-width:380px; position:relative; z-index:1; animation:fadeUp 0.7s ease forwards; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .brand { text-align:center; margin-bottom:36px; }
    .brand-name { font-family:'Cormorant Garamond',serif; font-size:1.6rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); }
    .brand-tagline { font-size:0.65rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); margin-top:6px; }
    .card { background:var(--surface); border:1px solid var(--border-subtle); border-radius:12px; padding:36px 32px; }
    .back { display:inline-flex; align-items:center; gap:6px; color:var(--text-muted); text-decoration:none; font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:28px; transition:color 0.2s; }
    .back:hover { color:var(--text-secondary); }
    .back svg { width:14px; height:14px; fill:currentColor; }
    h2 { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:300; color:var(--text); margin-bottom:4px; }
    .subtitle { font-size:0.78rem; color:var(--text-muted); margin-bottom:28px; line-height:1.5; }
    .form-group { margin-bottom:14px; }
    label { display:block; font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
    input[type="text"], input[type="email"], input[type="password"] {
      width:100%; background:var(--surface2); border:1px solid var(--border-subtle); border-radius:6px;
      padding:11px 14px; color:var(--text); font-size:0.85rem; font-weight:300;
      font-family:'DM Sans',sans-serif; outline:none; transition:0.2s;
    }
    input:focus { border-color:var(--gold-dim); }
    input::placeholder { color:var(--text-muted); }
    .hint { font-size:0.65rem; color:var(--text-muted); margin-top:5px; letter-spacing:0.04em; }
    .terms-row {
      display:flex; align-items:flex-start; gap:10px; margin:16px 0;
      padding:12px 14px; background:var(--surface2);
      border:1px solid var(--border-subtle); border-radius:6px;
      cursor:pointer; transition:border-color 0.2s;
    }
    .terms-row:hover { border-color:var(--border); }
    .terms-row input[type="checkbox"] {
      width:16px; height:16px; flex-shrink:0; margin-top:2px;
      accent-color:var(--gold); cursor:pointer; padding:0;
    }
    .terms-text { font-size:0.75rem; color:var(--text-secondary); line-height:1.6; }
    .terms-text a { color:var(--gold); text-decoration:none; border-bottom:1px solid rgba(201,168,76,0.3); transition:border-color 0.2s; }
    .terms-text a:hover { border-color:var(--gold); }

    .btn {
      width:100%; padding:13px; background:var(--gold); color:#080808;
      border:none; border-radius:6px; font-family:'DM Sans',sans-serif;
      font-size:0.78rem; font-weight:500; letter-spacing:0.12em;
      text-transform:uppercase; cursor:pointer; transition:0.2s; margin-top:4px;
    }
    .btn:hover { background:var(--gold-light); }
    .btn:disabled { background:var(--surface2); color:var(--text-muted); cursor:not-allowed; }
    .error { background:rgba(139,42,42,0.12); border:1px solid rgba(139,42,42,0.3); color:#FF8080; padding:10px 14px; border-radius:6px; font-size:0.78rem; margin-bottom:14px; display:none; line-height:1.4; }
    .success { background:rgba(201,168,76,0.06); border:1px solid var(--border); color:var(--gold); padding:10px 14px; border-radius:6px; font-size:0.78rem; margin-bottom:14px; display:none; line-height:1.4; }
    .bottom-link { text-align:center; margin-top:20px; font-size:0.75rem; color:var(--text-muted); }
    .bottom-link a { color:var(--gold); text-decoration:none; }
    .bottom-link a:hover { color:var(--gold-light); }
    .divider { height:1px; background:var(--border-subtle); margin:20px 0; }
    .grecaptcha-badge { visibility: hidden !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="brand-name">Kartvizit</div>
      <div class="brand-tagline">Dijital Kimliğinin Altın Standardı</div>
    </div>
    <div class="card">
      <a href="index.html" class="back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Geri
      </a>
      <h2>Kayıt Ol</h2>
      <p class="subtitle">Dijital kartvizitini oluşturmaya başla.</p>
      <div class="error" id="error-msg"></div>
      <div class="success" id="success-msg"></div>
      <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="username" placeholder="ornek: ahmet" autocomplete="off">
        <p class="hint">Kartvizit linkin: kartvizit.com/card.html?username=…</p>
      </div>
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="email" placeholder="email@sirket.com">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="password" placeholder="En az 6 karakter">
      </div>

      <!-- Kullanım Şartları Onayı -->
      <label class="terms-row" for="terms-check">
        <input type="checkbox" id="terms-check">
        <span class="terms-text">
          <a href="kullanim-sartlari.html" target="_blank" onclick="event.stopPropagation()">Kullanım Şartları</a>'nı ve
          <a href="gizlilik.html" target="_blank" onclick="event.stopPropagation()">Gizlilik Politikası</a>'nı okudum, kabul ediyorum.
        </span>
      </label>

      <!-- Google reCAPTCHA v3: arka planda çalışır, widget yok -->

      <button class="btn" id="register-btn" onclick="register()">Kayıt Ol</button>
      <div class="divider"></div>
      <div class="bottom-link">
        Hesabın var mı? <a href="login.html">Giriş yap</a>
      </div>
      <p style="font-size:0.62rem; color:var(--text-muted); text-align:center; margin-top:12px; line-height:1.6;">
  Bu site reCAPTCHA tarafından korunmaktadır.
  <a href="https://policies.google.com/privacy" target="_blank" style="color:var(--gold-dim); text-decoration:none;">Gizlilik Politikası</a> ve
  <a href="https://policies.google.com/terms" target="_blank" style="color:var(--gold-dim); text-decoration:none;">Hizmet Şartları</a> geçerlidir.
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    async function register() {
      const username  = document.getElementById('username').value.trim().toLowerCase();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const terms     = document.getElementById('terms-check').checked;
      const btn       = document.getElementById('register-btn');
      const errorEl   = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!username || !email || !password) {
        errorEl.textContent = 'Tüm alanları doldurun.';
        errorEl.style.display = 'block'; return;
      }
      if (username.length < 3) {
        errorEl.textContent = 'Kullanıcı adı en az 3 karakter olmalı.';
        errorEl.style.display = 'block'; return;
      }
      if (!/^[a-z0-9_]+$/.test(username)) {
        errorEl.textContent = 'Kullanıcı adı sadece harf, rakam ve _ içerebilir.';
        errorEl.style.display = 'block'; return;
      }
      if (!terms) {
        errorEl.textContent = 'Devam etmek için kullanım şartlarını kabul etmelisin.';
        errorEl.style.display = 'block'; return;
      }
      // reCAPTCHA v3: token al, skor kontrolü sunucu tarafında yapılmalı
      // Client-side'da token varlığı yeterli
      let captchaToken = '';
      try {
        captchaToken = await grecaptcha.execute('6LfAY5QsAAAAAOZMdB7bem83mt7e0K4iq3AVFzGr', {action: 'register'});
      } catch(e) {
        errorEl.textContent = 'reCAPTCHA doğrulaması başarısız. Sayfayı yenileyip tekrar dene.';
        errorEl.style.display = 'block'; return;
      }
      if (!captchaToken) {
        errorEl.textContent = 'reCAPTCHA doğrulaması başarısız. Sayfayı yenileyip tekrar dene.';
        errorEl.style.display = 'block'; return;
      }

      btn.disabled = true; btn.textContent = 'Kayıt yapılıyor...';
const { data: existing } = await sb.from('profiles').select('username').eq('username', username).single();
if (existing) {
  errorEl.textContent = 'Bu kullanıcı adı zaten alınmış.';
  errorEl.style.display = 'block';
  btn.disabled = false; btn.textContent = 'Kayıt Ol'; return;
}

const { data: existingEmail } = await sb.from('profiles').select('email').eq('email', email).single();
if (existingEmail) {
  errorEl.textContent = 'Bu e-posta adresi zaten kayıtlı.';
  errorEl.style.display = 'block';
  btn.disabled = false; btn.textContent = 'Kayıt Ol'; return;
}

const { data, error } = await sb.auth.signUp({
  email,
  password,
  options: {
    emailRedirectTo: window.location.origin + '/login.html'
  }
});

if (error) {
  errorEl.textContent = error.message;
  errorEl.style.display = 'block';
  btn.disabled = false; btn.textContent = 'Kayıt Ol'; return;
}

await sb.from('profiles').insert({ user_id: data.user.id, username, email });

successEl.textContent = '✓ Kayıt başarılı! E-postanı onaylayıp giriş yap.';
successEl.style.display = 'block';
btn.textContent = 'Kayıt Ol'; btn.disabled = false;
setTimeout(() => { window.location.href = 'login.html'; }, 2500);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
</script>
</body>
</html>
