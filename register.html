<script>
  async function register() {
    const username  = document.getElementById('username').value.trim().toLowerCase();
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;
    const terms     = document.getElementById('terms-check').checked;
    const btn       = document.getElementById('register-btn');
    const errorEl   = document.getElementById('error-msg');
    const successEl = document.getElementById('success-msg');

    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    if (!username || !email || !password) {
      errorEl.textContent = 'Tüm alanları doldurun.';
      errorEl.style.display = 'block'; return;
    }
    if (username.length < 3) {
      errorEl.textContent = 'Kullanıcı adı en az 3 karakter olmalı.';
      errorEl.style.display = 'block'; return;
    }
    if (!/^[a-z0-9_]+$/.test(username)) {
      errorEl.textContent = 'Kullanıcı adı sadece harf, rakam ve _ içerebilir.';
      errorEl.style.display = 'block'; return;
    }
    if (!terms) {
      errorEl.textContent = 'Devam etmek için kullanım şartlarını kabul etmelisin.';
      errorEl.style.display = 'block'; return;
    }

    let captchaToken = '';
    try {
      captchaToken = await grecaptcha.execute('6LfAY5QsAAAAAOZMdB7bem83mt7e0K4iq3AVFzGr', {action: 'register'});
    } catch(e) {
      errorEl.textContent = 'reCAPTCHA doğrulaması başarısız. Sayfayı yenileyip tekrar dene.';
      errorEl.style.display = 'block'; return;
    }
    if (!captchaToken) {
      errorEl.textContent = 'reCAPTCHA doğrulaması başarısız. Sayfayı yenileyip tekrar dene.';
      errorEl.style.display = 'block'; return;
    }

    btn.disabled = true; 
    btn.textContent = 'Kayıt yapılıyor...';

    const { data: existing } = await sb.from('profiles').select('username').eq('username', username).single();
if (existing) {
  errorEl.textContent = 'Bu kullanıcı adı zaten alınmış.';
  errorEl.style.display = 'block';
  btn.disabled = false; btn.textContent = 'Kayıt Ol'; return;
}

const { data: existingEmail } = await sb.from('profiles').select('email').eq('email', email).single();
if (existingEmail) {
  errorEl.textContent = 'Bu e-posta adresi zaten kayıtlı.';
  errorEl.style.display = 'block';
  btn.disabled = false; btn.textContent = 'Kayıt Ol'; return;
}
    }

    if (existingUsername) {
      errorEl.textContent = 'Bu kullanıcı adı zaten alınmış.';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Kayıt Ol';
      return;
    }

    const { data: existingEmail, error: emailCheckError } = await sb
      .from('profiles')
      .select('id')
      .eq('email', email)
      .maybeSingle();

    if (emailCheckError) {
      errorEl.textContent = emailCheckError.message;
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Kayıt Ol';
      return;
    }

    if (existingEmail) {
      errorEl.textContent = 'Bu e-posta adresi ile zaten kayıt var.';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Kayıt Ol';
      return;
    }

    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: {
        emailRedirectTo: 'https://burakyilmaz3453.github.io/kartvizit-platform/login.html'
      }
    });

    if (error) {
      errorEl.textContent = error.message;
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Kayıt Ol';
      return;
    }

    const { error: profileInsertError } = await sb
      .from('profiles')
      .insert({ user_id: data.user.id, username, email });

    if (profileInsertError) {
      errorEl.textContent = profileInsertError.message;
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Kayıt Ol';
      return;
    }

    successEl.textContent = '✓ Kayıt başarılı! E-postanı onaylayıp giriş yap.';
    successEl.style.display = 'block';
    btn.textContent = 'Kayıt Ol';
    btn.disabled = false;

    setTimeout(() => { 
      window.location.href = 'login.html'; 
    }, 2500);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
</script>
