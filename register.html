<!DOCTYPE html>
<html lang="tr">
<head>
  <!-- Platform favicon -->
  <link rel="icon" type="image/x-icon" href="favicon-platform.ico">
  <meta charset="UTF-8">
  <!-- Mobil uyumlu görünüm -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayıt Ol | Kartvizit</title>
  <style>
    /* Tüm elementlerin sıfırlanması */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Sayfa gövdesi: siyah arka plan, ortalanmış içerik */
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Form kartı: koyu arka plan, yuvarlatılmış köşeler */
    .card {
      background: #181a1e;
      border: 1px solid #2a2d35;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    /* Geri butonu: ana sayfaya döner */
    .back {
      color: #8b9bb4;
      text-decoration: none;
      font-size: 0.85rem;
      display: inline-block;
      margin-bottom: 25px;
    }
    .back:hover { color: #fff; }

    /* Sayfa başlığı */
    h2 { font-size: 1.4rem; margin-bottom: 6px; }

    /* Alt başlık açıklama metni */
    .subtitle { color: #8b9bb4; font-size: 0.85rem; margin-bottom: 30px; }

    /* Form alanı grubu: her input için boşluk */
    .form-group { margin-bottom: 16px; }

    /* Input etiketi: küçük, gri */
    label { display: block; font-size: 0.78rem; color: #8b9bb4; margin-bottom: 6px; }

    /* Input alanı: koyu arka plan, beyaz yazı */
    input {
      width: 100%;
      background: #1e2125;
      border: 1px solid #2a2d35;
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }
    /* Odaklanınca yeşil kenarlık */
    input:focus { border-color: #0e8c6f; }
    input::placeholder { color: #555; }

    /* Kayıt ol butonu: yeşil, tam genişlik */
    .btn {
      width: 100%;
      padding: 14px;
      background: #0e8c6f;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }
    .btn:hover { background: #0b7058; }
    /* Yükleniyor durumunda buton pasif */
    .btn:disabled { background: #333; cursor: not-allowed; }

    /* Hata mesajı kutusu: kırmızı tonlu, varsayılan gizli */
    .error {
      background: #2d1515;
      border: 1px solid #5a1f1f;
      color: #ff6b6b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }

    /* Başarı mesajı kutusu: yeşil tonlu, varsayılan gizli */
    .success {
      background: #0e2a22;
      border: 1px solid #0e8c6f;
      color: #0e8c6f;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }

    /* Giriş yap yönlendirme linki: ortalanmış, alt kısımda */
    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.83rem;
      color: #8b9bb4;
    }
    .login-link a { color: #0e8c6f; text-decoration: none; }

    /* İpucu metni: kullanıcı adı formatı hakkında bilgi */
    .hint {
      font-size: 0.75rem;
      color: #555;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <!-- Kayıt formu kartı -->
  <div class="card">
    <!-- Ana sayfaya dön linki -->
    <a href="index.html" class="back">← Geri</a>

    <h2>Kayıt Ol</h2>
    <p class="subtitle">Dijital kartvizitini oluşturmaya başla.</p>

    <!-- Hata mesajı: JS tarafından doldurulur ve gösterilir -->
    <div class="error" id="error-msg"></div>
    <!-- Başarı mesajı: kayıt tamamlanınca gösterilir -->
    <div class="success" id="success-msg"></div>

    <!-- Kullanıcı adı alanı: kartvizit URL'sinde kullanılır -->
    <div class="form-group">
      <label>Kullanıcı Adı</label>
      <!-- autocomplete kapalı: tarayıcı önerileri göstermesin -->
      <input type="text" id="username" placeholder="ornek: burak" autocomplete="off">
      <!-- Kullanıcıya link formatını gösterir -->
      <p class="hint">Kartvizit linkin: kartvizit.com/card.html?username=...</p>
    </div>

    <!-- E-posta alanı -->
    <div class="form-group">
      <label>E-posta</label>
      <input type="email" id="email" placeholder="email@ornek.com">
    </div>

    <!-- Şifre alanı -->
    <div class="form-group">
      <label>Şifre</label>
      <input type="password" id="password" placeholder="En az 6 karakter">
    </div>

    <!-- Kayıt ol butonu: tıklayınca register() çalışır -->
    <button class="btn" id="register-btn" onclick="register()">Kayıt Ol</button>

    <!-- Giriş yap yönlendirmesi -->
    <div class="login-link">
      Hesabın var mı? <a href="login.html">Giriş yap</a>
    </div>
  </div>

  <!-- Supabase JS kütüphanesi: auth ve veritabanı işlemleri için -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Supabase bağlantı bilgileri -->
  <script src="supabase.js"></script>

  <script>
    // Kayıt fonksiyonu
    async function register() {
      // Form değerlerini oku (username küçük harfe çevrilir)
      const username = document.getElementById('username').value.trim().toLowerCase();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('register-btn');
      const errorEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');

      // Önceki mesajları gizle
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      // Boş alan kontrolü
      if (!username || !email || !password) {
        errorEl.textContent = 'Tüm alanları doldurun.';
        errorEl.style.display = 'block';
        return;
      }

      // Kullanıcı adı minimum uzunluk kontrolü
      if (username.length < 3) {
        errorEl.textContent = 'Kullanıcı adı en az 3 karakter olmalı.';
        errorEl.style.display = 'block';
        return;
      }

      // Kullanıcı adı format kontrolü: sadece harf, rakam ve alt çizgi
      if (!/^[a-z0-9_]+$/.test(username)) {
        errorEl.textContent = 'Kullanıcı adı sadece harf, rakam ve _ içerebilir.';
        errorEl.style.display = 'block';
        return;
      }

      // Butonu pasif yap ve yükleniyor metni göster
      btn.disabled = true;
      btn.textContent = 'Kayıt yapılıyor...';

      // Kullanıcı adının daha önce alınıp alınmadığını kontrol et
      const { data: existing } = await sb
        .from('profiles')
        .select('username')
        .eq('username', username)
        .single();

      // Kullanıcı adı zaten varsa hata göster
      if (existing) {
        errorEl.textContent = 'Bu kullanıcı adı zaten alınmış.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Kayıt Ol';
        return;
      }

      // Supabase Auth ile yeni kullanıcı oluştur
      const { data, error } = await sb.auth.signUp({ email, password });

      // Auth hatası varsa göster
      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Kayıt Ol';
        return;
      }

      // Kullanıcı kaydı başarılıysa profiles tablosuna profil satırı ekle
      await sb.from('profiles').insert({
        user_id: data.user.id,  // Auth kullanıcısının ID'si
        username: username,      // Benzersiz kullanıcı adı
        email: email             // E-posta adresi
      });

      // Başarı mesajı göster
      successEl.textContent = 'Kayıt başarılı! E-postanı onaylayıp giriş yap.';
      successEl.style.display = 'block';
      btn.textContent = 'Kayıt Ol';
      btn.disabled = false;

      // 2.5 saniye sonra login sayfasına yönlendir
      setTimeout(() => { window.location.href = 'login.html'; }, 2500);
    }

    // Enter tuşuna basınca register() fonksiyonunu tetikle
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') register();
    });
  </script>
</body>
</html>
