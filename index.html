<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kartvizit Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: #0e8c6f;
    }

    .tagline {
      color: #8b9bb4;
      font-size: 0.95rem;
      margin-bottom: 50px;
      text-align: center;
    }

    .card {
      background: #181a1e;
      border: 1px solid #2a2d35;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .card h2 {
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    .card p {
      color: #8b9bb4;
      font-size: 0.85rem;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: 0.2s;
      margin-bottom: 12px;
    }

    .btn-primary {
      background: #0e8c6f;
      color: #fff;
    }

    .btn-primary:hover { background: #0b7058; }

    .btn-secondary {
      background: #23262b;
      color: #fff;
      border: 1px solid #2a2d35;
    }

    .btn-secondary:hover { background: #2c3036; }

    .divider {
      border: none;
      border-top: 1px solid #2a2d35;
      margin: 20px 0;
    }

    .demo-link {
      color: #0e8c6f;
      font-size: 0.8rem;
      text-decoration: none;
    }

    .demo-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="logo">🪪 Kartvizit</div>
  <p class="tagline">Dijital kartvizitini oluştur, paylaş, yönet.</p>

  <div class="card">
    <h2>Hoş Geldiniz</h2>
    <p>Kendi dijital kartvizitini oluşturmak için kayıt ol.</p>

    <a href="register.html" class="btn btn-primary">Kayıt Ol</a>
    <a href="login.html" class="btn btn-secondary">Giriş Yap</a>

    <hr class="divider">
    <a href="card.html?username=demo" class="demo-link">Demo kartviziti görüntüle →</a>
  </div>

</body>
</html>
